name: Flutter Android Build & Release

on:
  # 推送到 main 分支时触发
  push:
    branches: [ main, master ]
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发发布

  # Pull Request 时触发构建测试
  pull_request:
    branches: [ main, master ]

  # 手动触发
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release 版本号 (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

# 环境变量
env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ===========================================
  # Job 1: 代码检查和测试
  # ===========================================
  test:
    name: Code Analysis & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
        continue-on-error: true  # 暂时允许测试失败

  # ===========================================
  # Job 2: 构建 APK
  # ===========================================
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test  # 依赖 test job
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Build APK (Debug)
        run: flutter build apk --debug
        continue-on-error: true

      - name: Build App Bundle
        run: flutter build appbundle --release
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
        continue-on-error: true

  # ===========================================
  # Job 3: 创建 Release
  # ===========================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build  # 依赖 build job
    if: startsWith(github.ref, 'refs/tags/v')  # 只在推送 tag 时执行
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🚀 农业地块与农作物管理 App v${{ steps.get_version.outputs.VERSION }}
            
            ### 📱 Android APK
            - `app-release.apk` - Release 版本（推荐）
            - `app-debug.apk` - Debug 版本
            
            ### 🔧 安装说明
            1. 下载 `app-release.apk`
            2. 在 Android 设备上允许安装未知来源应用
            3. 点击 APK 文件安装
            
            ### 📋 更新日志
            - 请查看 [CHANGELOG.md](./CHANGELOG.md) 获取详细更新内容
          files: |
            artifacts/app-release.apk
            artifacts/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/app-release.apk
          asset_name: app-release.apk
          tag: ${{ github.ref }}
          overwrite: true

  # ===========================================
  # Job 4: 通知（可选）
  # ===========================================
  notify:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ APK 构建成功！"
            echo "📦 下载地址: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "❌ 构建失败，请检查日志"
          fi
